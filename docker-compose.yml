services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      LISTEN_HOST: "0.0.0.0"
      PORT: "8000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}"
    volumes:
      - app-data:/app/backend/data
    restart: unless-stopped

volumes:
  app-data:
